# Intercomparison configuration for SwissClim Evaluations
# Use this file for both CLI and notebook runs.
#
# - models: list of per-model output directories to compare
# - labels: optional human-friendly labels (must match models length); if omitted, folder names are used
# - output_root: where to write combined artifacts (PNG/CSV)
# - modules: subset of modules to run: spectra, hist, kde, maps, metrics, prob, vprof
# - max_map_panels: limit number of map panels rendered
# - max_crps_map_panels: limit CRPS map panels in probabilistic section

models:
  - output/modelA
  - output/modelB

labels:
  - Model A
  - Model B

output_root: output/intercomparison

modules: [spectra, hist, kde, maps, metrics, prob, vprof, bivariate]

max_map_panels: 4
max_crps_map_panels: 4

# Bivariate histograms configuration
# List of variable pairs to compare. Each pair is a list [var_x, var_y].
# IMPORTANT: These pairs must be a subset of the 'bivariate_pairs' defined in the
# evaluation config (e.g., example_config.yaml) used to generate the model outputs.
# If a pair was not computed during the evaluation run, it cannot be plotted here.
bivariate_pairs:
  - ["u10m", "v10m"]
  - ["t2m", "u10m"]
