# Full verification run configuration based on performance_config.yaml
# Designed to generate each table and plot once.

paths:
  prediction: "/capstor/store/cscs/swissai/a122/ESFM_Results/esfm_small_aa_unmask3v3_ri/predictions_step100000.zarr"
  target: [
    "/capstor/store/cscs/swissai/weatherbench/weatherbench2_2022_2023.zarr",
    "/capstor/store/cscs/swissai/weatherbench/weatherbench2_2024_2025.zarr"
  ]
  output_root: "output/full_verification_run"

selection:
  levels: [100, 500, 1000]
  temporal_resolution_hours: null
  datetimes: [
    "2023-01-02T00:2023-01-02T23"
  ]
  latitudes: [90.0, -89.75]
  longitudes: [0.0, 359.75]
  variables_2d: [
    "10m_u_component_of_wind",
    "10m_v_component_of_wind",
  ]
  variables_3d: [
    "geopotential",
  ]
  ensemble_member: 0
  check_missing: false

plotting:
  random_seed: 42
  plot_datetime: null
  plot_ensemble_members: null
  dpi: 48
  kde_max_samples: 50000
  histogram_max_samples: 50000
  output_mode: both
  histograms_per_lat_band: true
  wd_kde_per_lat_band: true
  wd_kde_global_evolution: true
  vertical_profiles_evolve_lead: true

modules:
  maps: true
  histograms: true
  wd_kde: true
  energy_spectra: true
  vertical_profiles: true
  deterministic: true
  ets: true
  probabilistic: false
  ssim: true
  multivariate: true

metrics:
  deterministic:
    report_per_level: true
    include: ["MAE", "RMSE", "MSE", "Relative MAE", "Relative L1", "Relative L2", "Pearson R", "FSS"]
    standardized_include: ["MAE", "RMSE", "MSE", "Relative MAE"]
    fss:
      quantile: 0.95
      window_size: 9
  ets:
    report_per_level: true
    thresholds: [50, 70, 90]
  energy_spectra:
    report_per_level: true
  probabilistic:
    report_per_level: true
  ssim:
    sigma: 1.5
    K1: 0.01
    K2: 0.03
    gaussian_weights: true
    use_sample_covariance: true
  multivariate:
    bivariate_pairs:
      - ["10m_u_component_of_wind", "10m_v_component_of_wind"]
