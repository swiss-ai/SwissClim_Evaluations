# Configuration for testing deterministic multi-lead time plots
# Uses a multi-lead time dataset but selects a single ensemble member.

paths:
  prediction: "/capstor/store/cscs/swissai/a122/ESFM_Results/esfm_precipERA5_8tails_6h/rollout_predensemble_ci-co2-sst_2023-01-02x28_40steps.zarr"
  target: [
    "/capstor/store/cscs/swissai/weatherbench/weatherbench2_2022_2023.zarr",
    "/capstor/store/cscs/swissai/weatherbench/weatherbench2_2024_2025.zarr"
  ]
  output_root: "output/test_multilead"

selection:
  levels: [100, 500, 1000]
  temporal_resolution_hours: null
  datetimes: [
    "2023-01-02T00:2023-01-02T23"
  ]
  latitudes: [90.0, -89.75]
  longitudes: [0.0, 359.75]
  variables_2d: [
    "10m_u_component_of_wind",
    "10m_v_component_of_wind",
  ]
  # Select member 0 to treat as deterministic
  ensemble_member: 0
  check_missing: false
  lead_time:
    mode: "stride"
    stride: 24
    max_hour: 120

plotting:
  random_seed: 42
  plot_datetime: null
  plot_ensemble_members: null
  dpi: 48
  kde_max_samples: 50000
  histogram_max_samples: 50000
  output_mode: both

  # Enable specific multi-lead plot features
  histograms_per_lat_band: true
  wd_kde_per_lat_band: true
  wd_kde_global_evolution: true
  vertical_profiles_evolve_lead: true

modules:
  maps: true
  histograms: true
  wd_kde: true
  energy_spectra: true
  vertical_profiles: true
  deterministic: true
  ets: true
  probabilistic: false
  ssim: true
  multivariate: true

metrics:
  deterministic:
    report_per_level: true
    include: ["MAE", "RMSE", "MSE", "Relative MAE", "Relative L1", "Relative L2", "Pearson R", "FSS"]
    standardized_include: ["MAE", "RMSE", "MSE", "Relative MAE"]
    fss:
      quantile: 0.95
      window_size: 9
  ets:
    report_per_level: true
    thresholds: [50, 70, 90]
  energy_spectra:
    report_per_level: true
  probabilistic:
    report_per_level: true
  ssim:
    sigma: 1.5
    K1: 0.01
    K2: 0.03
    gaussian_weights: true
    use_sample_covariance: true
  multivariate:
    bivariate_pairs:
      - ["10m_u_component_of_wind", "10m_v_component_of_wind"]
