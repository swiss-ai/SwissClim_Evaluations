# Debug configuration for SwissClim Evaluations
paths:
  prediction: "/capstor/store/cscs/swissai/a122/ESFM_Results/aurora_small_6h/rollout_pred_2023-01-02x112_2steps.zarr"
  target: [
    "/capstor/store/cscs/swissai/weatherbench/weatherbench2_2022_2023.zarr",
    "/capstor/store/cscs/swissai/weatherbench/weatherbench2_2024_2025.zarr"
  ]
  output_root: "output/debug_run"

selection:
  levels: [500, 850]
  temporal_resolution_hours: null
  datetimes: ["2023-01-02T00:2023-01-02T12"]
  # Latitude selection behavior (not cyclic):
  # - Provide as [min_lat, max_lat] or [max_lat, min_lat]. Any order is acceptable
  #   and data will be selected inside the defined latitude band.
  latitudes: [90.0, -89.75]
  # Longitude selection behavior:
  # - If first < second → standard band [first, second]
  # - If first > second → wrap-around union [first..max_lon] ∪ [min_lon..second]
  longitudes: [0.0, 359.75]
  variables_2d: ["10m_u_component_of_wind", "10m_v_component_of_wind"]
  variables_3d: ["u_component_of_wind", "v_component_of_wind"]
  ensemble_members: null
  ensemble:
    maps: members

  check_missing: false

  lead_time:
    mode: "first"

plotting:
  random_seed: 42
  plot_datetime: null
  plot_ensemble_members: null
  dpi: 48
  kde_max_samples: 10000
  histogram_max_samples: 10000
  histograms_per_lat_band: false
  wd_kde_per_lat_band: false
  output_mode: both

modules:
  maps: true
  histograms: true
  wd_kde: true
  energy_spectra: true
  vertical_profiles: true
  deterministic: true
  ets: true
  probabilistic: false
  multivariate: false
  ssim: false

metrics:
  deterministic:
    report_per_level: true
    include: ["MAE", "RMSE"]
    standardized_include: ["MAE"]
    fss:
      quantile: 0.95
      window_size: 9
  ets:
    report_per_level: true
    thresholds: [90]
  energy_spectra:
    report_per_level: true

probabilistic:
  report_per_level: true
