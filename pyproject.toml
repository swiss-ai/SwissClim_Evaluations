[project]
name = "swissclim-evaluations"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "SwissClim Team"}
]
requires-python = ">=3.11"
dependencies = [
    "cartopy>=0.24.1",
    "dask[distributed]>=2025.2.0",
    "ipykernel>=6.29.5",
    "matplotlib>=3.10.1",
    "opt-einsum>=3.4.0",
    "scipy>=1.15.2",
    "setuptools>=76.0.0",
    "tqdm>=4.67.1",
    "weatherbenchx",
    "xarray>=2025.1.2",
    "zarr<3.0.0",
]

[project.scripts]
swissclim-evaluations = "swissclim_evaluations:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# git clone weatherbenchX and remove google cloud and apache beam dependencies
[tool.uv.sources]
weatherbenchx = { path = "../weatherbenchX" }
