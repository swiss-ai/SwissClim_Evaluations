[project]
name = "swissclim-evaluations"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "SwissClim Team"}
]
requires-python = ">=3.12"
dependencies = [
    "cartopy>=0.24.1",
    "dask[distributed]>=2025.2.0",
    "ipykernel>=6.29.5",
    "matplotlib>=3.10.1",
    "xarray>=2025.1.2",
    "zarr<3.0.0",
]

[project.scripts]
swissclim-evaluations = "swissclim_evaluations:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
